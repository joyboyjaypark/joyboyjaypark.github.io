<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Superinvestor Dashboard</title>
<style>
  :root{--bg:#0f1117;--surface:#1a1d26;--border:#2e3347;--accent:#4f8ef7;--accent2:#7c5cfc;--text:#e4e6f0;--muted:#8890a8}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 20px}
  .logo{font-size:28px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:48px}
  .list{width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px}
  .card{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:18px 24px;text-decoration:none;color:var(--text);
    transition:border-color .2s,background .2s;
  }
  .card:hover{border-color:var(--accent);background:#1f2235}
  .date{font-size:18px;font-weight:600;letter-spacing:.5px}
  .card:first-child .date::after{content:" (최신)";font-size:12px;color:var(--accent);margin-left:8px}
  .arrow{color:var(--accent);font-size:20px}
  .empty{color:var(--muted);font-size:14px}
  .footer{margin-top:48px;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
  <div class="logo">📊 Superinvestor Dashboard</div>
  <div class="sub">날짜를 선택하면 해당 시점의 데이터를 볼 수 있습니다</div>
  <div class="list">
        <a class="card" href="./260330/">
          <span class="date">2026-03-30</span>
          <span class="arrow">→</span>
        </a>
        <a class="card" href="./260329/">
          <span class="date">2026-03-29</span>
          <span class="arrow">→</span>
        </a>
        <a class="card" href="./260328/">
          <span class="date">2026-03-28</span>
          <span class="arrow">→</span>
        </a>
        <a class="card" href="./260327/">
          <span class="date">2026-03-27</span>
          <span class="arrow">→</span>
        </a>
        <a class="card" href="./260326/">
          <span class="date">2026-03-26</span>
          <span class="arrow">→</span>
        </a>
        <a class="card" href="./260324/">
          <span class="date">2026-03-24</span>
          <span class="arrow">→</span>
        </a>
  </div>
  <div class="footer">joyboyjaypark</div>
</body>
</html>
