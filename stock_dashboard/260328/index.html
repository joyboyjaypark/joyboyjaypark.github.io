<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superinvestor Stock Dashboard</title>
<style>
  :root {
    --bg:#0f1117;--surface:#1a1d26;--surface2:#22263a;
    --accent:#4f8ef7;--accent2:#7c5cfc;
    --text:#e4e6f0;--muted:#8890a8;--border:#2e3347;
    --green:#29d98a;--red:#f05c6e;
    --row-odd:#1a1d26;--row-even:#1f2235;--row-hover:#2a3050;
    --sticky-bg:#161926;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  .header{
    background:linear-gradient(135deg,#1a1d26 0%,#22263a 100%);
    border-bottom:1px solid var(--border);
    padding:20px 28px;display:flex;align-items:center;gap:16px;
    position:sticky;top:0;z-index:200;
  }
  .logo{font-size:22px;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .subtitle{font-size:12px;color:var(--muted);margin-top:2px}
  .stats{margin-left:auto;display:flex;gap:20px}
  .stat-badge{text-align:center}
  .stat-badge .num{font-size:20px;font-weight:700;color:var(--accent)}
  .stat-badge .lbl{font-size:11px;color:var(--muted)}
  .controls{
    padding:12px 28px;background:var(--surface);border-bottom:1px solid var(--border);
    display:flex;flex-wrap:wrap;align-items:center;gap:12px;
    position:sticky;top:73px;z-index:180;
  }
  .search-box{position:relative;flex:1;max-width:320px}
  .search-box input{
    width:100%;padding:8px 12px 8px 34px;
    background:var(--bg);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-size:13px;outline:none;
    transition:border-color .2s;
  }
  .search-box input:focus{border-color:var(--accent)}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px}
  .info-text{font-size:12px;color:var(--muted)}
  .updated{font-size:11px;color:var(--muted);margin-left:auto}
  .tabs{
    display:flex;flex-wrap:wrap;gap:6px;padding:10px 28px;
    background:var(--surface);border-bottom:1px solid var(--border);
    position:sticky;top:117px;z-index:170;
  }
  .tab-btn{
    padding:5px 14px;border:1px solid var(--border);border-radius:20px;
    background:transparent;color:var(--muted);font-size:12px;cursor:pointer;
    transition:all .2s;
  }
  .tab-btn:hover{border-color:var(--accent);color:var(--accent)}
  .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .table-wrapper{overflow:auto;max-height:calc(100vh - 170px);padding:0 28px 28px}
  table{border-collapse:collapse;width:max-content;min-width:100%;font-size:12.5px}
  thead{position:sticky;top:0;z-index:100}
  th{
    background:var(--surface2);color:var(--muted);
    padding:9px 12px;white-space:nowrap;
    border-bottom:2px solid var(--border);border-right:1px solid var(--border);
    cursor:pointer;user-select:none;font-weight:600;font-size:11px;letter-spacing:.3px;
    transition:background .15s,color .15s;text-align:left;
  }
  th:hover{background:#2a3050;color:var(--text)}
  th.sort-asc::after{content:" ▲";color:var(--accent);font-size:9px}
  th.sort-desc::after{content:" ▼";color:var(--accent);font-size:9px}
  th.sticky-col{position:sticky;z-index:110}
  th.col0{left:0;width:52px;min-width:52px}
  th.col1{left:52px;width:82px;min-width:82px}
  th.col2{left:134px;border-right:2px solid var(--accent)!important}
  td{padding:7px 12px;white-space:nowrap;border-bottom:1px solid var(--border);border-right:1px solid rgba(255,255,255,.04)}
  tr:nth-child(odd) td{background:var(--row-odd)}
  tr:nth-child(even) td{background:var(--row-even)}
  tr:hover td{background:var(--row-hover)!important}
  td.sticky-col{position:sticky;z-index:10}
  tr:nth-child(odd) td.sticky-col{background:var(--sticky-bg)}
  tr:nth-child(even) td.sticky-col{background:#1c1f30}
  tr:hover td.sticky-col{background:var(--row-hover)!important}
  td.col0{left:0;width:52px;min-width:52px;text-align:center;color:var(--muted);font-size:12px}
  td.col1{left:52px;width:82px;min-width:82px;font-weight:700;color:var(--accent);font-size:13px}
  td.col2{left:134px;border-right:2px solid var(--accent)!important}
  .pct-pos{color:var(--green);font-weight:500}
  .pct-neg{color:var(--red);font-weight:500}
  .pct-zero{color:var(--muted)}
  .na{color:var(--border);font-size:11px}
  .num-cell{text-align:right;font-variant-numeric:tabular-nums}
  .no-result{text-align:center;padding:60px;color:var(--muted);font-size:14px}
  .table-wrapper::-webkit-scrollbar{width:6px;height:6px}
  .table-wrapper::-webkit-scrollbar-track{background:var(--bg)}
  .table-wrapper::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .table-wrapper::-webkit-scrollbar-thumb:hover{background:var(--muted)}
  thead .summary-row td{background:#252a42;border-bottom:1px solid var(--border)}
  thead .top10-row td{border-bottom:1px solid var(--accent2)}
  thead .all-row td{border-bottom:2px solid var(--accent)}
  td.summary-label{color:var(--accent);font-weight:700;font-size:11px;white-space:nowrap}
  td.summary-cell{font-size:11.5px}
  thead .summary-row:hover td{background:#2d3250!important}
  thead td.sticky-col{position:sticky;z-index:110}
  .expand-btn{cursor:pointer;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;border:1px solid var(--accent);color:var(--accent);font-size:12px;font-weight:700;line-height:1;background:transparent;transition:all .15s;user-select:none}
  .expand-btn:hover{background:var(--accent);color:#fff}
  tr.sector-child td{background:#151828!important;font-size:12px}
  tr.sector-child td.sticky-col{background:#151828!important}
  tr.sector-child:hover td{background:#1e2240!important}
  tr.sector-child td.col1{color:var(--accent);font-weight:700}
  tr.sector-child td.ticker-indent{padding-left:32px!important}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">📊 Superinvestor Stock Dashboard</div>
  </div>
  <div class="stats">
    <div class="stat-badge"><div class="num" id="total-count">498</div><div class="lbl">종목 수</div></div>
    <div class="stat-badge"><div class="num" id="shown-count">498</div><div class="lbl">표시 중</div></div>
  </div>
</div>
<div class="controls">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="티커 · 종목명 · 섹터 검색…" oninput="applyFilter()">
  </div>
  <span class="info-text" id="sort-info">컬럼 헤더를 클릭하면 정렬됩니다</span>
  <span class="updated">생성: 2026-03-28 16:45</span>
</div>
<div class="tabs" id="tabs"></div>
<div class="table-wrapper">
  <table id="mainTable"><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>

    return `<span class="pct-zero num-cell">${s}</span>`;
  }
  if (col.includes('시가총액') || col.includes('매출') || col.includes('순이익') || col.includes('거래량') || col.includes('유통주식')) {
    if (Math.abs(n) >= 1000000) return `<span class="num-cell">${(n/1000000).toFixed(2)}T</span>`;
    if (Math.abs(n) >= 1000) return `<span class="num-cell">${(n/1000).toFixed(1)}B</span>`;
    return `<span class="num-cell">${n.toFixed(2)}</span>`;
  }
  if (col === '임직원수') return `<span class="num-cell">${Number(n).toLocaleString()}</span>`;
  const dec = Number.isInteger(n) ? 0 : 2;
  return `<span class="num-cell">${n.toFixed(dec)}</span>`;
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = Object.keys(TABS_DEF).map(t =>
    `<button class="tab-btn${t===currentTab?' active':''}" onclick="switchTab('${t}')">${t}</button>`
  ).join('');
}

function switchTab(name) {
  currentTab = name; sortCol = null; sortDir = 1;
  if (name === '섹터') sectorFiltered = buildSectorRows();
  renderTabs(); renderTable();
}

function calcSummaryRow(rows, cols, label) {
  const res = {};
  cols.forEach((col, i) => {
    if (i < 2) { res[col] = ''; return; }
    if (col === '종목명') { res[col] = label; return; }
    if (TEXT_SET.has(col)) { res[col] = ''; return; }
    const vals = rows.map(r => parseFloat(r[col])).filter(v => !isNaN(v));
    if (!vals.length) { res[col] = null; return; }
    res[col] = SUM_COLS.has(col)
      ? vals.reduce((a, b) => a + b, 0)
      : vals.reduce((a, b) => a + b, 0) / vals.length;
  });
  return res;
}

function summaryRowHtml(cols, data, rowCls) {
  return '<tr class="summary-row ' + rowCls + '">' + cols.map((c, i) => {
    const sticky = i===0 ? ' sticky-col col0' : i===1 ? ' sticky-col col1' : i===2 ? ' sticky-col col2' : '';
    const base = sticky + ' summary-cell';
    if (c === '순위' || c === '티커') return `<td class="${base}"><span class="na">—</span></td>`;
    if (c === '종목명') return `<td class="${base} summary-label">${data['종목명']}</td>`;
    const v = data[c];
    if (v === '' || v === null || v === undefined) return `<td class="${base}"><span class="na">—</span></td>`;
    return `<td class="${base}">${fmt(v, c)}</td>`;
  }).join('') + '</tr>';
}

function renderHeader(cols) {
  const isSector = currentTab === '섹터';
  let summaryHtml = '';
  if (!isSector) {
    const top10    = RAW.slice(0, 10);
    const allSum   = calcSummaryRow(RAW,   cols, RAW.length + '대 기업 총계');
    const top10Sum = calcSummaryRow(top10, cols, '10대 기업 총계');
    summaryHtml = summaryRowHtml(cols, top10Sum, 'top10-row') + summaryRowHtml(cols, allSum, 'all-row');
  }
  document.getElementById('thead').innerHTML =
    summaryHtml +
    '<tr>' + cols.map((c, i) => {
      let sticky = isSector
        ? (i===0 ? ' sticky-col col0' : i===1 ? ' sticky-col col1' : '')
        : (i===0 ? ' sticky-col col0' : i===1 ? ' sticky-col col1' : i===2 ? ' sticky-col col2' : '');
      const sc = c === sortCol ? (sortDir===1?' sort-asc':' sort-desc') : '';
      return `<th class="${sticky}${sc}" onclick="sortBy('${c.replace(/'/g,"\'")}')"> ${c}</th>`;
    }).join('') + '</tr>';
}

function renderRows(cols, rows) {
  if (!rows.length) {
    document.getElementById('tbody').innerHTML = `<tr><td colspan="${cols.length}" class="no-result">검색 결과가 없습니다</td></tr>`;
    return;
  }
  const isSector = currentTab === '섹터';
  const html = [];
  rows.forEach(row => {
    // 섹터 부모행
    const sectorName = isSector ? row['종목명'] : null;
    const isExpanded = isSector && sectorExpanded.has(sectorName);
    const trParts = cols.map((c, i) => {
      let sticky = isSector
        ? (i===0 ? ' sticky-col col0' : i===1 ? ' sticky-col col1' : '')
        : (i===0 ? ' sticky-col col0' : i===1 ? ' sticky-col col1' : i===2 ? ' sticky-col col2' : '');
      if (isSector && c === '순위') {
        const btn = `<span class="expand-btn" onclick="toggleSector('${sectorName.replace(/'/g,"\'")}')">${isExpanded?'−':'+'}</span>`;
        return `<td class="${sticky}" style="text-align:center">${row[c]} ${btn}</td>`;
      }
      if (isSector && c === '종목명') {
        return `<td class="${sticky} summary-label">${fmt(row[c], c)}</td>`;
      }
      if (isSector && c === '종목수') {
        return `<td style="text-align:center;color:var(--muted);font-size:12px">${row[c]}</td>`;
      }
      return `<td class="${sticky}">${fmt(row[c], c)}</td>`;
    }).join('');
    html.push(`<tr>${trParts}</tr>`);

    // 하위 종목행 (확장 시)
    if (isExpanded && row._stocks) {
      const stockCols = TABS_DEF['섹터'];
      row._stocks.forEach((stock, si) => {
        const childParts = stockCols.map((c, i) => {
          let sticky = i===0 ? ' sticky-col col0' : i===1 ? ' sticky-col col1' : '';
          if (c === '순위') return `<td class="${sticky} ticker-indent" style="color:var(--muted);text-align:center">${stock['순위'] ?? si+1}</td>`;
          if (c === '종목명') {
            const ticker = stock['티커'] || '';
            const name   = stock['종목명'] || '';
            return `<td class="${sticky} ticker-indent"><span style="color:var(--accent);font-weight:700;margin-right:6px">${ticker}</span>${name}</td>`;
          }
          if (c === '종목수') return `<td><span class="na">—</span></td>`;
          return `<td class="${sticky}">${fmt(stock[c], c)}</td>`;
        }).join('');
        html.push(`<tr class="sector-child">${childParts}</tr>`);
      });
    }
  });
  document.getElementById('tbody').innerHTML = html.join('');
}

function renderTable() {
  const cols = TABS_DEF[currentTab];
  const rows = currentTab === '섹터' ? sectorFiltered : filtered;
  renderHeader(cols); renderRows(cols, rows);
  document.getElementById('shown-count').textContent = rows.length;
}

function sortBy(col) {
  sortDir = (sortCol === col) ? -sortDir : 1;
  sortCol = col;
  const rows = currentTab === '섹터' ? sectorFiltered : filtered;
  rows.sort((a, b) => {
    let va=a[col], vb=b[col];
    if(va===null||va===undefined) return 1;
    if(vb===null||vb===undefined) return -1;
    const na=parseFloat(va), nb=parseFloat(vb);
    if(!isNaN(na)&&!isNaN(nb)) return (na-nb)*sortDir;
    return String(va).localeCompare(String(vb),'ko')*sortDir;
  });
  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if(th.textContent.trim().replace(/ [▲▼]$/,'') === col)
      th.classList.add(sortDir===1?'sort-asc':'sort-desc');
  });
  const cols = TABS_DEF[currentTab];
  renderRows(cols, rows);
  document.getElementById('sort-info').textContent = `정렬: ${col} ${sortDir===1?'▲ 오름차순':'▼ 내림차순'}`;
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (currentTab === '섹터') {
    const all = buildSectorRows();
    sectorFiltered = q ? all.filter(r => (r['종목명']||'').toLowerCase().includes(q)) : all;
    renderTable();
    return;
  }
  filtered = q
    ? RAW.filter(r => ['티커','종목명','섹터','업종','국가'].some(k => (r[k]||'').toLowerCase().includes(q)))
    : [...RAW];
  if (sortCol) {
    filtered.sort((a,b) => {
      let va=a[sortCol],vb=b[sortCol];
      if(va===null||va===undefined) return 1;
      if(vb===null||vb===undefined) return -1;
      const na=parseFloat(va),nb=parseFloat(vb);
      if(!isNaN(na)&&!isNaN(nb)) return (na-nb)*sortDir;
      return String(va).localeCompare(String(vb),'ko')*sortDir;
    });
  }
  renderTable();
}

renderTabs();
renderTable();
document.getElementById('sort-info').textContent = '정렬: 시가총액(M$) ▼ 내림차순';
</script>
</body>
</html>
